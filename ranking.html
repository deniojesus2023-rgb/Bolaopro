<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0A0A0A">
  <title>Zagga — Ranking Global</title>
  <link rel="stylesheet" href="app.css">
  <style>
    .podium {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 12px;
      padding: 24px 16px 8px;
    }
    .podium__place {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .podium__place--2nd { order: -1; }
    .podium__place--1st { }
    .podium__place--3rd { order: 1; }

    .podium__avatar-wrap { position: relative; }
    .podium__crown {
      position: absolute;
      top: -16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.25rem;
    }
    .podium__avatar {
      border: 3px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      background: var(--bg-card-alt);
      border-radius: 50%;
      flex-shrink: 0;
    }
    .podium__place--1st .podium__avatar { width: 72px; height: 72px; border-color: #FFD700; box-shadow: 0 0 16px rgba(255,215,0,0.4); }
    .podium__place--2nd .podium__avatar { width: 60px; height: 60px; border-color: #C0C0C0; }
    .podium__place--3rd .podium__avatar { width: 56px; height: 56px; border-color: #CD7F32; }

    .podium__name {
      font-size: 0.75rem;
      font-weight: 700;
      text-align: center;
      max-width: 80px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .podium__pts { font-size: 0.75rem; color: var(--neon-green); font-weight: 700; }
    .podium__bar {
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: 900;
    }
    .podium__place--1st .podium__bar { background: rgba(255,215,0,0.2); border: 1px solid rgba(255,215,0,0.4); width: 80px; height: 60px; }
    .podium__place--2nd .podium__bar { background: rgba(192,192,192,0.15); border: 1px solid rgba(192,192,192,0.3); width: 70px; height: 44px; }
    .podium__place--3rd .podium__bar { background: rgba(205,127,50,0.15); border: 1px solid rgba(205,127,50,0.3); width: 64px; height: 32px; }

    /* Filtros */
    .filter-chips {
      display: flex;
      gap: 8px;
      padding: 0 16px;
      overflow-x: auto;
      scrollbar-width: none;
      margin-bottom: 16px;
    }
    .filter-chips::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0;
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 0.875rem;
      font-weight: 600;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      transition: all var(--transition);
    }
    .chip.active {
      background: rgba(0,255,133,0.1);
      border-color: var(--neon-green);
      color: var(--neon-green);
    }

    /* List */
    .rank-list { display: flex; flex-direction: column; gap: 8px; padding: 0 16px; }

    /* My position sticky card */
    .my-rank-card {
      margin: 0 16px 16px;
      background: linear-gradient(135deg, #0D2018 0%, #0A1A12 100%);
      border: 1px solid var(--neon-green);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 4px 20px rgba(0,255,133,0.15);
    }
    .my-rank-label {
      font-size: 0.75rem;
      color: var(--neon-green);
      font-weight: 700;
      margin-bottom: 2px;
    }
    .my-rank-name { font-size: 0.9375rem; font-weight: 700; }
    .my-rank-pts { font-size: 1.25rem; font-weight: 900; color: var(--neon-green); }
  </style>
</head>
<body>
  <header class="header">
    <span class="header__title">Ranking Global</span>
    <div class="badge badge-green" id="totalPlayers">—</div>
  </header>

  <main class="page page--with-nav page--with-header">
    <div class="content" style="padding: 0; padding-bottom: 16px;">

      <!-- Pódio top 3 -->
      <div class="podium" id="podium"></div>

      <!-- Minha posição -->
      <div class="my-rank-card" id="myRankCard">
        <div style="font-size: 1.5rem; font-weight: 900; color: var(--neon-green); width:32px; text-align:center;" id="myPos">—</div>
        <div style="flex:1;">
          <div class="my-rank-label">Sua posição</div>
          <div class="my-rank-name" id="myName">Você</div>
        </div>
        <div class="my-rank-pts" id="myPts">0 pts</div>
      </div>

      <!-- Filtros -->
      <div class="filter-chips">
        <button class="chip active" onclick="setFilter('semanal', this)">Semanal</button>
        <button class="chip" onclick="setFilter('mensal', this)">Mensal</button>
        <button class="chip" onclick="setFilter('geral', this)">Geral</button>
        <button class="chip" onclick="setFilter('amigos', this)">Amigos</button>
      </div>

      <!-- Lista -->
      <div class="rank-list" id="rankList"></div>

    </div>
  </main>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="home.html" class="bottom-nav__item">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>Home</span>
    </a>
    <a href="meus-boloes.html" class="bottom-nav__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
      <span>Meus Bolões</span>
    </a>
    <a href="ranking.html" class="bottom-nav__item active">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 20h2V8H7v12zm4 0h2V4h-2v16zm4 0h2v-8h-2v8z"/></svg>
      <span>Ranking</span>
    </a>
    <a href="ofertas.html" class="bottom-nav__item">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      <span>Ofertas</span>
    </a>
    <a href="perfil.html" class="bottom-nav__item">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v2h20v-2c0-3.3-6.7-5-10-5z"/></svg>
      <span>Perfil</span>
    </a>
  </nav>
</body>
</html>
<script>
  if (!localStorage.getItem('bp_session')) window.location.href = 'login.html';

  var emojis = ['👑','🦁','🐉','🔥','⚡','🎯','💎','🏆','🌟','⭐'];
  var names  = ['CraqueJão','ZéPalpite','FutMestre','GolDoRei','CaravanaDo10','BolãoKing','PalpiteAce','VitoriaFC','CampeoFC','FenômenoX'];
  var myPts  = parseInt(localStorage.getItem('bp_points') || '0');

  function makePlayer(pos, pts, name, emoji) {
    return { pos:pos, name: name || names[pos-1] || 'Jogador'+pos, pts: pts || Math.max(0, 5000 - (pos-1)*120 + Math.floor(Math.random()*80)), emoji: emoji || emojis[(pos-1)%emojis.length] };
  }

  function buildRanking(showMe) {
    var players = [];
    for (var i = 1; i <= 20; i++) players.push(makePlayer(i));
    // Insere o usuário
    if (showMe) {
      var myPos = 34;
      players.splice(myPos - 1, 0, { pos: myPos, name:'Você', pts: myPts, emoji:'😎', isMe: true });
    }
    return players;
  }

  var currentFilter = 'semanal';
  var players = buildRanking(true);

  function renderPodium() {
    var top3 = players.slice(0,3);
    var order = [top3[1], top3[0], top3[2]]; // 2nd, 1st, 3rd
    var classes = ['2nd','1st','3rd'];
    var colors  = ['#C0C0C0','#FFD700','#CD7F32'];
    var heights = ['44px','60px','32px'];
    var crowns  = ['🥈','👑','🥉'];
    document.getElementById('podium').innerHTML = order.map(function(p, i) {
      if (!p) return '';
      return '<div class="podium__place podium__place--' + classes[i] + '">'
        + '<div class="podium__avatar-wrap">'
        +   '<div class="podium__crown">' + crowns[i] + '</div>'
        +   '<div class="podium__avatar" style="border-color:' + colors[i] + '">' + p.emoji + '</div>'
        + '</div>'
        + '<div class="podium__name">' + p.name + '</div>'
        + '<div class="podium__pts">' + p.pts.toLocaleString('pt-BR') + ' pts</div>'
        + '<div class="podium__bar" style="height:' + heights[i] + '">' + p.pos + 'º</div>'
        + '</div>';
    }).join('');
  }

  function renderMyCard() {
    var myPtsVal = parseInt(localStorage.getItem('bp_points') || '0');
    document.getElementById('myPos').textContent = '34º';
    document.getElementById('myName').textContent = 'Você';
    document.getElementById('myPts').textContent = myPtsVal.toLocaleString('pt-BR') + ' pts';
  }

  function renderList() {
    var list = players.slice(3);
    document.getElementById('totalPlayers').textContent = players.length + ' jogadores';
    document.getElementById('rankList').innerHTML = list.map(function(p) {
      var posClass = p.pos === 1 ? 'rank-pos--gold' : p.pos === 2 ? 'rank-pos--silver' : p.pos === 3 ? 'rank-pos--bronze' : '';
      return '<div class="rank-item' + (p.isMe ? ' rank-item--me' : '') + '">'
        + '<div class="rank-pos ' + posClass + '">' + p.pos + '</div>'
        + '<div style="width:36px;height:36px;border-radius:50%;background:var(--bg-card-alt);display:flex;align-items:center;justify-content:center;font-size:1.25rem;flex-shrink:0;">' + p.emoji + '</div>'
        + '<div style="flex:1;">'
        +   '<div style="font-size:0.9375rem;font-weight:' + (p.isMe ? '700' : '500') + ';color:' + (p.isMe ? 'var(--neon-green)' : 'var(--text-primary)') + ';">' + p.name + '</div>'
        +   '<div style="font-size:0.75rem;color:var(--text-muted);">' + p.pts.toLocaleString('pt-BR') + ' pontos</div>'
        + '</div>'
        + (p.isMe ? '<span class="badge badge-green">Você</span>' : '')
        + '</div>';
    }).join('');
  }

  function setFilter(filter, el) {
    currentFilter = filter;
    document.querySelectorAll('.chip').forEach(function(c) { c.classList.remove('active'); });
    el.classList.add('active');
    players = buildRanking(true);
    renderPodium();
    renderList();
  }

  renderPodium();
  renderMyCard();
  renderList();
</script>
