<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BolãoPro — Entrar</title>
<link rel="stylesheet" href="design-system.css"/>
<link rel="stylesheet" href="shared.css"/>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
body{display:block;background:var(--bg);}
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.auth-box{background:var(--white);border:1px solid var(--border);border-radius:var(--r-xl);padding:36px 32px;width:100%;max-width:400px;box-shadow:var(--shadow-md);}
.auth-logo{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:28px;}
.auth-logo-mark{width:58px;height:58px;border-radius:16px;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:28px;}
.auth-title{font-size:22px;font-weight:700;letter-spacing:-.3px;}
.auth-sub{font-size:13px;color:var(--muted);}
.tabs{display:flex;gap:4px;background:var(--bg);border-radius:var(--r-sm);padding:4px;margin-bottom:22px;}
.tab{flex:1;padding:9px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);background:none;transition:all .15s;font-family:'Inter',sans-serif;}
.tab.on{background:linear-gradient(135deg, var(--green) 0%, var(--green2) 100%);color:#fff;box-shadow:0 2px 6px rgba(0,223,129,.20);}
.msg{border-radius:var(--r-sm);padding:10px 12px;font-size:12px;margin-bottom:14px;display:none;}
.msg.err{background:var(--red-lt);border:1px solid #FECACA;color:var(--red);}
.msg.ok{background:var(--green-lt);border:1px solid var(--green-m);color:var(--green);}
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-logo-mark"><i data-lucide="trophy"></i></div>
      <div style="text-align:center">
        <div class="auth-title">BolãoPro</div>
        <div class="auth-sub">Seu bolão, suas regras.</div>
      </div>
    </div>
    <div class="tabs">
      <button class="tab on" onclick="setTab('login',this)">Entrar</button>
      <button class="tab" onclick="setTab('reg',this)">Cadastrar</button>
    </div>
    <div id="errMsg" class="msg err"></div>
    <div id="okMsg"  class="msg ok"></div>

    <!-- LOGIN -->
    <div id="loginForm">
      <div class="fl"><label>E-mail</label><input id="lEmail" type="email" placeholder="seu@email.com" onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <div class="fl"><label>Senha</label><input id="lPass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <button class="btn-full" id="lBtn" onclick="doLogin()">Entrar</button>
    </div>

    <!-- CADASTRO -->
    <div id="regForm" style="display:none">
      <div class="fl"><label>Usuário</label><input id="rUser" placeholder="seunome" oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9_]/g,'')"/></div>
      <div class="fl"><label>E-mail</label><input id="rEmail" type="email" placeholder="seu@email.com"/></div>
      <div class="fl"><label>Senha</label><input id="rPass" type="password" placeholder="Mínimo 6 caracteres"/></div>
      <button class="btn-full" id="rBtn" onclick="doReg()">Criar Conta Grátis</button>
    </div>

    <p style="text-align:center;font-size:12px;color:var(--muted);margin-top:18px">
      <a href="index.html" style="color:var(--green)">← Voltar ao início</a>
    </p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script><script src="app.js"></script>
<script>
window.addEventListener('DOMContentLoaded',async()=>{
  const u=await getUser(); if(u) location.href='index.html'
})
function setTab(t,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on')); btn.classList.add('on')
  document.getElementById('loginForm').style.display=t==='login'?'block':'none'
  document.getElementById('regForm').style.display=t==='reg'?'block':'none'
  clearMsgs()
}
function showErr(m){const e=document.getElementById('errMsg');e.textContent=m;e.style.display='block';document.getElementById('okMsg').style.display='none'}
function showOk(m){const e=document.getElementById('okMsg');e.textContent=m;e.style.display='block';document.getElementById('errMsg').style.display='none'}
function clearMsgs(){['errMsg','okMsg'].forEach(id=>document.getElementById(id).style.display='none')}

async function doLogin(){
  const email=document.getElementById('lEmail').value.trim()
  const pass=document.getElementById('lPass').value
  if(!email||!pass){showErr('Preencha e-mail e senha.');return}
  const btn=document.getElementById('lBtn'); btn.textContent='Entrando…'; btn.disabled=true
  const{error}=await sb().auth.signInWithPassword({email,password:pass})
  btn.textContent='Entrar'; btn.disabled=false
  if(error){showErr(error.message==='Invalid login credentials'?'E-mail ou senha incorretos.':error.message);return}
  location.href='index.html'
}
async function doReg(){
  const user=document.getElementById('rUser').value.trim()
  const email=document.getElementById('rEmail').value.trim()
  const pass=document.getElementById('rPass').value
  if(!user){showErr('Digite um nome de usuário.');return}
  if(!email){showErr('Digite seu e-mail.');return}
  if(pass.length<6){showErr('Senha deve ter no mínimo 6 caracteres.');return}
  const btn=document.getElementById('rBtn'); btn.textContent='Criando…'; btn.disabled=true
  const{error}=await sb().auth.signUp({email,password:pass,options:{data:{username:user,full_name:user}}})
  btn.textContent='Criar Conta Grátis'; btn.disabled=false
  if(error){showErr(error.message);return}
  showOk('✅ Conta criada! Verifique seu e-mail para confirmar.')
}
</script>
</body>
</html>
