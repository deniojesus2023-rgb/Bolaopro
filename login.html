<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#020307">
  <title>Zagga — Entrar</title>
  <link rel="stylesheet" href="app.css">
  <style>
    .login-page {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
      padding: 40px 24px 32px;
    }
    .login-header { margin-bottom: 40px; }
    .login-logo {
      font-size: 2rem;
      font-weight: 900;
      color: var(--accent);
      text-shadow: var(--glow-accent);
      letter-spacing: -1px;
    }
    .login-tagline { font-size: 0.875rem; color: var(--text-secondary); margin-top: 4px; }
    .login-title { font-size: 1.75rem; font-weight: 900; line-height: 1.2; margin-bottom: 8px; }
    .login-subtitle { color: var(--text-secondary); font-size: 0.9375rem; }

    .auth-tabs {
      display: flex;
      background: var(--bg-card);
      border-radius: var(--radius-md);
      padding: 4px;
      margin-bottom: 28px;
    }
    .auth-tab {
      flex: 1;
      padding: 11px;
      border-radius: var(--radius-sm);
      font-size: 0.9375rem;
      font-weight: 700;
      color: var(--text-secondary);
      text-align: center;
      transition: all var(--transition);
    }
    .auth-tab.active { background: var(--accent); color: #000; }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 13px 16px;
      border-radius: var(--radius-md);
      background: var(--bg-card);
      border: 1px solid var(--border);
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--text-primary);
      transition: border-color var(--transition);
    }
    .social-btn:active { border-color: var(--accent); }
    .social-icon { width: 20px; height: 20px; }
    .form-stack { display: flex; flex-direction: column; gap: 16px; }
    .forgot-link {
      font-size: 0.875rem;
      color: var(--accent);
      text-align: right;
      display: block;
      margin-top: -8px;
    }
    .terms-text { font-size: 0.75rem; color: var(--text-muted); text-align: center; line-height: 1.5; }
    .terms-text a { color: var(--accent); }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10,10,10,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .loading-overlay.show { opacity: 1; pointer-events: all; }
    .loader-circle {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-header">
      <div class="login-logo" style="display:flex;align-items:center;gap:10px;">
        <img src="logo.svg" alt="Z" style="width:44px;height:44px;border-radius:10px;">
        Zagga
      </div>
      <div class="login-tagline">Seu Palpite Vale Prêmio!</div>
    </div>

    <div style="margin-bottom: 28px;">
      <h1 class="login-title" id="pageTitle">Bem-vindo<br>de volta!</h1>
      <p class="login-subtitle" id="pageSubtitle">Entre para continuar palpitando</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Entrar</button>
      <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Criar Conta</button>
    </div>

    <div class="form-stack" style="margin-bottom: 20px;">
      <button class="social-btn" onclick="socialLogin('google')">
        <svg class="social-icon" viewBox="0 0 24 24" fill="none">
          <path d="M21.8 12.2c0-.7-.1-1.4-.2-2H12v3.8h5.5c-.2 1.2-.9 2.2-2 2.9v2.4h3.2c1.9-1.7 3.1-4.3 3.1-7.1z" fill="#4285F4"/>
          <path d="M12 22c2.7 0 4.9-.9 6.5-2.4l-3.2-2.4c-.9.6-2 .9-3.3.9-2.6 0-4.7-1.7-5.5-4.1H3.2v2.5C4.8 19.9 8.1 22 12 22z" fill="#34A853"/>
          <path d="M6.5 14c-.2-.6-.3-1.3-.3-2s.1-1.4.3-2V7.5H3.2A9.9 9.9 0 002 12c0 1.6.4 3.2 1.2 4.5L6.5 14z" fill="#FBBC04"/>
          <path d="M12 5.9c1.5 0 2.8.5 3.8 1.5l2.8-2.8C16.9 3 14.7 2 12 2 8.1 2 4.8 4.1 3.2 7.5l3.3 2.5C7.3 7.6 9.4 5.9 12 5.9z" fill="#EA4335"/>
        </svg>
        Entrar com Google
      </button>
      <button class="social-btn" onclick="socialLogin('facebook')">
        <svg class="social-icon" viewBox="0 0 24 24" fill="#1877F2">
          <path d="M24 12.07C24 5.41 18.63 0 12 0S0 5.41 0 12.07C0 18.1 4.39 23.1 10.13 24v-8.44H7.08v-3.49h3.04V9.41c0-3.02 1.8-4.7 4.54-4.7 1.31 0 2.68.24 2.68.24v2.97h-1.5c-1.5 0-1.96.93-1.96 1.89v2.26h3.32l-.53 3.49h-2.79V24C19.61 23.1 24 18.1 24 12.07z"/>
        </svg>
        Entrar com Facebook
      </button>
    </div>

    <div class="divider" style="margin-bottom: 20px;">ou use seu e-mail</div>

    <form class="form-stack" id="authForm" onsubmit="handleSubmit(event)">
      <div class="form-group" id="nameGroup" style="display:none;">
        <label class="form-label">Nome completo</label>
        <input type="text" class="form-input" placeholder="Seu nome" id="nameInput" autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label">E-mail</label>
        <input type="email" class="form-input" placeholder="seu@email.com" id="emailInput" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <input type="password" class="form-input" placeholder="••••••••" id="passwordInput" required autocomplete="current-password">
      </div>
      <a href="#" class="forgot-link" id="forgotLink" onclick="forgotPassword(event)">Esqueci minha senha</a>
      <button type="submit" class="btn btn-primary" id="submitBtn">Entrar</button>
      <p class="terms-text" id="termsText" style="display:none;">
        Ao criar sua conta você concorda com os
        <a href="#">Termos de Uso</a> e a <a href="#">Política de Privacidade</a>.
      </p>
    </form>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="loader-circle"></div>
  </div>

  <script>
    var mode = 'login';
    function switchTab(tab) {
      mode = tab;
      var r = tab === 'register';
      document.getElementById('tabLogin').classList.toggle('active', !r);
      document.getElementById('tabRegister').classList.toggle('active', r);
      document.getElementById('nameGroup').style.display  = r ? '' : 'none';
      document.getElementById('forgotLink').style.display = r ? 'none' : '';
      document.getElementById('termsText').style.display  = r ? '' : 'none';
      document.getElementById('submitBtn').textContent    = r ? 'Criar Conta' : 'Entrar';
      document.getElementById('pageTitle').innerHTML      = r ? 'Crie sua<br>conta grátis!' : 'Bem-vindo<br>de volta!';
      document.getElementById('pageSubtitle').textContent = r ? 'Cadastre-se e comece a palpitar' : 'Entre para continuar palpitando';
    }
    function setLoading(on) { document.getElementById('loadingOverlay').classList.toggle('show', on); }
    function handleSubmit(e) {
      e.preventDefault();
      setLoading(true);
      setTimeout(function() {
        localStorage.setItem('bp_session', 'demo_token');
        window.location.href = 'home.html';
      }, 1500);
    }
    function socialLogin(provider) {
      setLoading(true);
      setTimeout(function() {
        localStorage.setItem('bp_session', 'demo_token');
        window.location.href = 'home.html';
      }, 1500);
    }
    function forgotPassword(e) {
      e.preventDefault();
      var email = document.getElementById('emailInput').value;
      alert('Se o e-mail ' + (email || 'informado') + ' estiver cadastrado, você receberá as instruções em breve.');
    }
  </script>
</body>
</html>
