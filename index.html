<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0A0A0A">
  <title>BolãoPro</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="app.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      background: var(--bg-primary);
      overflow: hidden;
    }
    .splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      animation: fadeInUp 0.6s ease forwards;
    }
    .splash__logo-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .splash__glow {
      position: absolute;
      width: 140px;
      height: 140px;
      background: radial-gradient(circle, rgba(0,255,133,0.3) 0%, transparent 70%);
      border-radius: 50%;
      animation: pulse-neon 2s infinite;
    }
    .splash__icon {
      position: relative;
      width: 96px;
      height: 96px;
      background: linear-gradient(135deg, #0D2018 0%, #1A3D2A 100%);
      border: 2px solid var(--neon-green);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--glow-green);
      font-size: 3rem;
    }
    .splash__brand {
      font-size: 2.5rem;
      font-weight: 900;
      color: var(--neon-green);
      text-shadow: var(--glow-green);
      letter-spacing: -1px;
    }
    .splash__slogan {
      font-size: 1rem;
      color: var(--text-secondary);
      font-weight: 500;
      letter-spacing: 0.3px;
    }
    .splash__loader {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    .splash__dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--neon-green);
      animation: blink 1.2s infinite;
    }
    .splash__dot:nth-child(2) { animation-delay: 0.2s; }
    .splash__dot:nth-child(3) { animation-delay: 0.4s; }
  </style>
</head>
<body>
  <div class="splash">
    <div class="splash__logo-wrap">
      <div class="splash__glow"></div>
      <div class="splash__icon">🏆</div>
    </div>
    <div>
      <div class="splash__brand text-center">BolãoPro</div>
      <div class="splash__slogan text-center">Seu Palpite Vale Prêmio!</div>
    </div>
    <div class="splash__loader">
      <div class="splash__dot"></div>
      <div class="splash__dot"></div>
      <div class="splash__dot"></div>
    </div>
  </div>

  <script>
    (function () {
      var token = localStorage.getItem('bp_session');
      var done  = localStorage.getItem('bp_onboarding_done');
      setTimeout(function () {
        if (token) {
          window.location.href = 'home.html';
        } else if (done) {
          window.location.href = 'login.html';
        } else {
          window.location.href = 'onboarding.html';
        }
      }, 2200);
    })();
  </script>
</body>
</html>
