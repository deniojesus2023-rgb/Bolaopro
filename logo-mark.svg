<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#04312E"/>
      <stop offset="100%" stop-color="#02171A"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,223,129,0.18)"/>
      <stop offset="100%" stop-color="rgba(0,223,129,0)"/>
    </radialGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Soft glow behind ball -->
  <circle cx="256" cy="246" r="170" fill="url(#glow)"/>

  <!-- Outer circle of ball -->
  <circle cx="256" cy="246" r="143" fill="none" stroke="#00DF81" stroke-width="16"/>

  <!-- Central pentagon (filled, pointing up) -->
  <polygon
    points="256,184.6 314.4,227.1 292.4,295.7 219.6,295.7 197.6,227.1"
    fill="#00DF81"
  />

  <!-- 5 radiating lines from pentagon vertices to circle edge -->
  <line x1="256"   y1="184.6" x2="256"   y2="102.6" stroke="#00DF81" stroke-width="14" stroke-linecap="round"/>
  <line x1="314.4" y1="227.1" x2="392.2" y2="201.9" stroke="#00DF81" stroke-width="14" stroke-linecap="round"/>
  <line x1="292.4" y1="295.7" x2="340.5" y2="362.2" stroke="#00DF81" stroke-width="14" stroke-linecap="round"/>
  <line x1="219.6" y1="295.7" x2="171.5" y2="362.2" stroke="#00DF81" stroke-width="14" stroke-linecap="round"/>
  <line x1="197.6" y1="227.1" x2="119.8" y2="201.9" stroke="#00DF81" stroke-width="14" stroke-linecap="round"/>
</svg>
