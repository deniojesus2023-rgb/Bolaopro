<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#020307">
  <title>Zagga — Home</title>
  <link rel="stylesheet" href="app.css">
  <style>
    /* Banner do Bolão da Semana */
    .weekly-banner {
      background: linear-gradient(135deg, #10100A 0%, #181808 50%, #0D0D05 100%);
      border: 1px solid var(--accent);
      border-radius: var(--radius-lg);
      padding: 20px;
      position: relative;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .weekly-banner::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 140px; height: 140px;
      background: radial-gradient(circle, rgba(248,255,19,0.15) 0%, transparent 70%);
      border-radius: 50%;
    }
    .weekly-banner__tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      border-radius: 100px;
      padding: 4px 12px;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 12px;
    }
    .weekly-banner__title {
      font-size: 1.375rem;
      font-weight: 900;
      margin-bottom: 6px;
      line-height: 1.2;
    }
    .weekly-banner__prize {
      font-size: 2rem;
      font-weight: 900;
      color: var(--accent);
      text-shadow: var(--glow-accent);
      margin-bottom: 4px;
    }
    .weekly-banner__sub {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }
    .weekly-banner__footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    /* Notifications dot */
    .notif-dot {
      width: 8px; height: 8px;
      background: var(--neon-red);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--neon-red);
      position: absolute;
      top: 2px; right: 2px;
    }
    .notif-btn { position: relative; }

    /* Section header */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .section-title { font-size: 1rem; font-weight: 700; }
    .section-link { font-size: 0.875rem; color: var(--neon-green); }

    /* Scrollable game list */
    .games-list { display: flex; flex-direction: column; gap: 12px; }

    /* Bolão card (compact, for game list in home) */
    .home-game {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color var(--transition);
    }
    .home-game:active { border-color: var(--border-neon); }
    .home-game__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .home-game__league { font-size: 0.75rem; color: var(--text-muted); }
    .home-game__time { font-size: 0.75rem; color: var(--text-secondary); }
    .home-game__matchup {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .home-game__team {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .home-game__emblem {
      width: 40px; height: 40px;
      background: var(--bg-card-alt);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }
    .home-game__name { font-size: 0.8125rem; font-weight: 700; text-align: center; }
    .home-game__center { padding: 0 12px; text-align: center; }
    .home-game__vs { font-size: 0.75rem; color: var(--text-muted); font-weight: 700; }
    .home-game__btn {
      width: 100%;
      padding: 11px;
      background: transparent;
      border: 1px solid var(--neon-green);
      border-radius: var(--radius-sm);
      color: var(--neon-green);
      font-size: 0.9rem;
      font-weight: 700;
      transition: all var(--transition);
    }
    .home-game__btn:active { background: rgba(0,255,133,0.1); }
    .home-game__btn.done {
      border-color: var(--border);
      color: var(--text-secondary);
      background: var(--bg-card-alt);
    }

    /* Points chip */
    .points-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 6px 14px;
    }
    .points-chip__val { font-size: 1rem; font-weight: 900; color: var(--neon-green); }
    .points-chip__label { font-size: 0.75rem; color: var(--text-muted); }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header__logo" style="display:flex;align-items:center;gap:8px;">
      <img src="logo.svg" alt="Z" style="width:32px;height:32px;border-radius:7px;">
      Zagga
    </div>
    <div class="header__actions">
      <div class="points-chip">
        <span class="points-chip__val" id="headerPoints">0</span>
        <span class="points-chip__label">pts</span>
      </div>
      <button class="btn-icon notif-btn" onclick="location.href='#'">
        <span class="notif-dot"></span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="page page--with-nav page--with-header">
    <div class="content" style="padding-top: 20px;">

      <!-- Weekly Banner -->
      <div class="weekly-banner">
        <div class="weekly-banner__tag">⚡ Bolão da Semana</div>
        <div class="weekly-banner__title">Grande Prêmio<br>Rodada #12</div>
        <div class="weekly-banner__prize">R$ 50.000</div>
        <div class="weekly-banner__sub">em prêmios para os melhores palpiteiros</div>
        <div class="weekly-banner__footer">
          <!-- Countdown -->
          <div class="countdown" id="countdown">
            <div class="countdown__block">
              <span class="countdown__num" id="cdDays">00</span>
              <span class="countdown__label">DIAS</span>
            </div>
            <span class="countdown__sep">:</span>
            <div class="countdown__block">
              <span class="countdown__num" id="cdHours">00</span>
              <span class="countdown__label">HRS</span>
            </div>
            <span class="countdown__sep">:</span>
            <div class="countdown__block">
              <span class="countdown__num" id="cdMins">00</span>
              <span class="countdown__label">MIN</span>
            </div>
            <span class="countdown__sep">:</span>
            <div class="countdown__block">
              <span class="countdown__num" id="cdSecs">00</span>
              <span class="countdown__label">SEG</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Games Section -->
      <div class="section-header">
        <span class="section-title">Jogos da Rodada</span>
        <span class="badge badge-green" id="gamesCount">8 jogos</span>
      </div>

      <div class="games-list" id="gamesList"></div>

      <div style="height: 8px;"></div>
    </div>
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="home.html" class="bottom-nav__item active">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>Home</span>
    </a>
    <a href="meus-boloes.html" class="bottom-nav__item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
      <span>Meus Bolões</span>
    </a>
    <a href="ranking.html" class="bottom-nav__item">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 20h2V8H7v12zm4 0h2V4h-2v16zm4 0h2v-8h-2v8z"/></svg>
      <span>Ranking</span>
    </a>
    <a href="ofertas.html" class="bottom-nav__item">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      <span>Ofertas</span>
    </a>
    <a href="perfil.html" class="bottom-nav__item">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v2h20v-2c0-3.3-6.7-5-10-5z"/></svg>
      <span>Perfil</span>
    </a>
  </nav>
</body>
</html>
<script>
  // Guard: redireciona se não logado
  if (!localStorage.getItem('bp_session')) {
    window.location.href = 'login.html';
  }

  // Pontos do header
  var pts = parseInt(localStorage.getItem('bp_points') || '0');
  document.getElementById('headerPoints').textContent = pts;

  // Countdown para próxima rodada (dias até domingo)
  function updateCountdown() {
    var now = new Date();
    var target = new Date(now);
    var day = now.getDay();
    var daysUntilSun = (7 - day) % 7 || 7;
    target.setDate(now.getDate() + daysUntilSun);
    target.setHours(23, 59, 59, 0);
    var diff = target - now;
    if (diff < 0) diff = 0;
    var d = Math.floor(diff / 86400000);
    var h = Math.floor((diff % 86400000) / 3600000);
    var m = Math.floor((diff % 3600000) / 60000);
    var s = Math.floor((diff % 60000) / 1000);
    document.getElementById('cdDays').textContent  = String(d).padStart(2,'0');
    document.getElementById('cdHours').textContent = String(h).padStart(2,'0');
    document.getElementById('cdMins').textContent  = String(m).padStart(2,'0');
    document.getElementById('cdSecs').textContent  = String(s).padStart(2,'0');
  }
  updateCountdown();
  setInterval(updateCountdown, 1000);

  // Jogos mockados
  var games = [
    { id:1, league:'Brasileirão Série A', homeTeam:'Flamengo',   homeEmoji:'🔴', awayTeam:'Palmeiras',  awayEmoji:'🟢', time:'Sab · 16:00' },
    { id:2, league:'Brasileirão Série A', homeTeam:'Corinthians', homeEmoji:'⚫', awayTeam:'São Paulo',  awayEmoji:'🔴', time:'Sab · 18:30' },
    { id:3, league:'Brasileirão Série A', homeTeam:'Grêmio',      homeEmoji:'🔵', awayTeam:'Internacional', awayEmoji:'🔴', time:'Dom · 16:00' },
    { id:4, league:'Copa do Brasil',      homeTeam:'Atlético-MG', homeEmoji:'⚫', awayTeam:'Cruzeiro',   awayEmoji:'🔵', time:'Dom · 18:00' },
    { id:5, league:'Brasileirão Série A', homeTeam:'Santos',      homeEmoji:'⚪', awayTeam:'Botafogo',   awayEmoji:'⚫', time:'Dom · 20:00' },
  ];

  var saved = JSON.parse(localStorage.getItem('bp_picks') || '{}');

  function buildGames() {
    var container = document.getElementById('gamesList');
    document.getElementById('gamesCount').textContent = games.length + ' jogos';
    container.innerHTML = games.map(function(g) {
      var hasPick = saved[g.id];
      return '<div class="home-game" id="game-' + g.id + '">'
        + '<div class="home-game__header">'
        +   '<span class="home-game__league">' + g.league + '</span>'
        +   '<span class="home-game__time">' + g.time + '</span>'
        + '</div>'
        + '<div class="home-game__matchup">'
        +   '<div class="home-game__team">'
        +     '<div class="home-game__emblem">' + g.homeEmoji + '</div>'
        +     '<span class="home-game__name">' + g.homeTeam + '</span>'
        +   '</div>'
        +   '<div class="home-game__center"><span class="home-game__vs">VS</span></div>'
        +   '<div class="home-game__team">'
        +     '<div class="home-game__emblem">' + g.awayEmoji + '</div>'
        +     '<span class="home-game__name">' + g.awayTeam + '</span>'
        +   '</div>'
        + '</div>'
        + '<button class="home-game__btn' + (hasPick ? ' done' : '') + '" onclick="goToPick(' + g.id + ')">'
        +   (hasPick ? '✓ Palpite: ' + hasPick : '⚡ Dar Palpite')
        + '</button>'
        + '</div>';
    }).join('');
  }

  function goToPick(id) {
    localStorage.setItem('bp_current_game', id);
    window.location.href = 'palpites.html';
  }

  buildGames();
</script>
