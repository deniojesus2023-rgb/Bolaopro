<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#020307">
  <title>Zagga — Meus Bolões</title>
  <link rel="stylesheet" href="app.css">
  <style>
    .bolao-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color var(--transition);
    }
    .bolao-card:active { border-color: var(--border-neon); }
    .bolao-card__header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .bolao-card__info { flex: 1; }
    .bolao-card__name { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
    .bolao-card__meta { font-size: 0.8125rem; color: var(--text-muted); }
    .bolao-card__prize {
      font-size: 1.125rem;
      font-weight: 900;
      color: var(--neon-green);
      text-shadow: 0 0 8px rgba(0,255,133,0.3);
      white-space: nowrap;
    }
    .bolao-card__stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .bolao-stat {
      background: var(--bg-card-alt);
      border-radius: var(--radius-sm);
      padding: 10px 8px;
      text-align: center;
    }
    .bolao-stat__val { font-size: 1.125rem; font-weight: 700; }
    .bolao-stat__label { font-size: 0.625rem; color: var(--text-muted); margin-top: 2px; }
    .bolao-card__footer {
      display: flex;
      gap: 8px;
    }
    .bolao-card__footer .btn { flex: 1; padding: 10px; font-size: 0.875rem; }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 48px 24px;
      text-align: center;
    }
    .empty-state__icon { font-size: 3.5rem; }
    .empty-state__title { font-size: 1.125rem; font-weight: 700; }
    .empty-state__desc { font-size: 0.9rem; color: var(--text-secondary); line-height: 1.5; }

    /* FAB */
    .fab {
      position: fixed;
      bottom: calc(var(--nav-height) + 16px);
      right: 16px;
      width: 56px;
      height: 56px;
      background: var(--neon-green);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--glow-green);
      font-size: 1.5rem;
      color: #000;
      cursor: pointer;
      transition: transform var(--transition);
      z-index: 50;
    }
    .fab:active { transform: scale(0.92); }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal {
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      background: var(--bg-secondary);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .modal-overlay.show .modal { transform: translateY(0); }
    .modal__handle {
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto -8px;
    }
    .modal__title { font-size: 1.25rem; font-weight: 900; }
    .modal-bottom-space { height: 32px; }
  </style>
</head>
<body>
  <header class="header">
    <span class="header__title">Meus Bolões</span>
    <div style="width: 40px;"></div>
  </header>

  <main class="page page--with-nav page--with-header">
    <div class="content" style="padding-top: 20px;">

      <!-- Tabs -->
      <div class="tabs" style="margin-bottom: 20px;">
        <button class="tab active" id="tabParticipados" onclick="switchTab('participados')">Participando</button>
        <button class="tab" id="tabCriados" onclick="switchTab('criados')">Criados por mim</button>
      </div>

      <!-- Lista -->
      <div id="boloesList" class="flex flex-col gap-3"></div>

    </div>
  </main>

  <!-- FAB criar bolão -->
  <button class="fab" onclick="openCreateModal()" title="Criar novo bolão">+</button>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="home.html" class="bottom-nav__item">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>Home</span>
    </a>
    <a href="meus-boloes.html" class="bottom-nav__item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
      <span>Meus Bolões</span>
    </a>
    <a href="ranking.html" class="bottom-nav__item">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 20h2V8H7v12zm4 0h2V4h-2v16zm4 0h2v-8h-2v8z"/></svg>
      <span>Ranking</span>
    </a>
    <a href="ofertas.html" class="bottom-nav__item">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      <span>Ofertas</span>
    </a>
    <a href="perfil.html" class="bottom-nav__item">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v2h20v-2c0-3.3-6.7-5-10-5z"/></svg>
      <span>Perfil</span>
    </a>
  </nav>

  <!-- Modal criar bolão -->
  <div class="modal-overlay" id="createModal" onclick="closeIfBackdrop(event)">
    <div class="modal">
      <div class="modal__handle"></div>
      <h2 class="modal__title">Criar Novo Bolão</h2>
      <form class="form-stack" onsubmit="createBolao(event)">
        <div class="form-group">
          <label class="form-label">Nome do Bolão</label>
          <input type="text" class="form-input" id="bolaoName" placeholder="Ex: Bolão dos Amigos" required>
        </div>
        <div class="form-group">
          <label class="form-label">Máximo de participantes</label>
          <input type="number" class="form-input" id="bolaoMax" placeholder="Ex: 20" min="2" max="200" value="20">
        </div>
        <button type="submit" class="btn btn-primary">Criar Bolão Privado</button>
        <button type="button" class="btn btn-ghost" onclick="closeCreateModal()">Cancelar</button>
      </form>
      <div class="modal-bottom-space"></div>
    </div>
  </div>
</body>
</html>
<script>
  if (!localStorage.getItem('bp_session')) window.location.href = 'login.html';

  var currentTab = 'participados';

  var mockParticipados = [
    { id:1, name:'Bolão da Semana #12', type:'public', participants:847, max:999, myRank:34, prize:'R$ 50.000', status:'active' },
    { id:2, name:'Bolão do Brasileirão',  type:'public', participants:2341, max:9999, myRank:128, prize:'R$ 10.000', status:'active' },
  ];
  var mockCriados = [
    { id:3, name:'Bolão dos Amigos', type:'private', participants:8, max:20, myRank:2, prize:'-', status:'active', code:'ABC123' },
  ];

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tabParticipados').classList.toggle('active', tab === 'participados');
    document.getElementById('tabCriados').classList.toggle('active', tab === 'criados');
    renderList();
  }

  function renderList() {
    var list = currentTab === 'participados' ? mockParticipados : mockCriados;
    var container = document.getElementById('boloesList');
    if (!list.length) {
      container.innerHTML = '<div class="empty-state">'
        + '<div class="empty-state__icon">🏆</div>'
        + '<div class="empty-state__title">Nenhum bolão ainda</div>'
        + '<div class="empty-state__desc">Crie seu primeiro bolão privado e convide os amigos!</div>'
        + '</div>';
      return;
    }
    container.innerHTML = list.map(function(b) {
      var extraBtn = b.code
        ? '<button class="btn btn-ghost btn-sm" onclick="copyCode(\'' + b.code + '\')">📋 Código: ' + b.code + '</button>'
        : '';
      return '<div class="bolao-card">'
        + '<div class="bolao-card__header">'
        +   '<div class="bolao-card__info">'
        +     '<div class="bolao-card__name">' + b.name + '</div>'
        +     '<div class="bolao-card__meta">' + b.participants + ' participantes · ' + (b.type === 'private' ? '🔒 Privado' : '🌐 Público') + '</div>'
        +   '</div>'
        +   '<span class="bolao-card__prize">' + b.prize + '</span>'
        + '</div>'
        + '<div class="bolao-card__stats">'
        +   '<div class="bolao-stat"><div class="bolao-stat__val">' + b.myRank + 'º</div><div class="bolao-stat__label">Minha Posição</div></div>'
        +   '<div class="bolao-stat"><div class="bolao-stat__val">' + b.participants + '</div><div class="bolao-stat__label">Jogadores</div></div>'
        +   '<div class="bolao-stat"><div class="bolao-stat__val text-neon">Ativo</div><div class="bolao-stat__label">Status</div></div>'
        + '</div>'
        + '<div class="bolao-card__footer">'
        +   '<button class="btn btn-outline btn-sm" onclick="location.href=\'palpites.html\'">⚡ Palpitar</button>'
        +   (extraBtn || '<button class="btn btn-ghost btn-sm">Ver Ranking</button>')
        + '</div>'
        + '</div>';
    }).join('');
  }

  function openCreateModal() { document.getElementById('createModal').classList.add('show'); }
  function closeCreateModal() { document.getElementById('createModal').classList.remove('show'); }
  function closeIfBackdrop(e) { if (e.target === e.currentTarget) closeCreateModal(); }

  function createBolao(e) {
    e.preventDefault();
    var name = document.getElementById('bolaoName').value;
    var code = Math.random().toString(36).substring(2,8).toUpperCase();
    mockCriados.unshift({ id: Date.now(), name: name, type:'private', participants:1, max:parseInt(document.getElementById('bolaoMax').value)||20, myRank:1, prize:'-', status:'active', code: code });
    closeCreateModal();
    switchTab('criados');
  }

  function copyCode(code) {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(code).then(function() { showSnack('Código copiado: ' + code); });
    } else {
      showSnack('Código: ' + code);
    }
  }

  function showSnack(msg) {
    var s = document.createElement('div');
    s.className = 'snackbar';
    s.textContent = msg;
    document.body.appendChild(s);
    setTimeout(function() { s.classList.add('show'); }, 10);
    setTimeout(function() { s.classList.remove('show'); setTimeout(function(){ s.remove(); }, 300); }, 2500);
  }

  renderList();
</script>
