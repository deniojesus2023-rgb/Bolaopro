<script>
document.addEventListener('DOMContentLoaded',async()=>{
  const user=await initAuth()
  if(!user){
    document.getElementById('content').innerHTML='<div class="empty"><div class="empty-icon">🔒</div><p>Faça login para ver seus bolões</p><a href="login.html" class="btn-full" style="max-width:200px;margin-top:12px">Entrar</a></div>'
    return
  }
  hideEl('sideLogin');showEl('sideLogout')
  const p=await getProfile(user.id);const n=p?.username??user.email?.split('@')[0]??'?'
  setEl('topUserName',n);setEl('topUserAv',n.slice(0,2).toUpperCase())
  const data=await getMeusBoloes(user.id)
  if(!data.length){
    document.getElementById('content').innerHTML='<div class="empty"><div class="empty-icon">⚽</div><p>Você ainda não tem bolões.<br>Crie o primeiro!</p><a href="index.html" class="btn-full" style="max-width:220px;margin-top:14px">Criar Bolão Grátis</a></div>'
    return
  }
  const cards=data.map(d=>{
    const b=d.boloes; if(!b) return ''
    const cnt=b.participants?.[0]?.count??0
    const prz=(b.cota_value??0)*cnt*0.95
    return`<a href="bolao.html?id=${b.id}" style="text-decoration:none;color:inherit;display:block;margin-bottom:10px">
      <div class="card">
        <div class="bolao-row" style="border:none;padding:16px 18px">
          <div class="b-dot ${stDot(b.status)}"></div>
          <div class="b-info">
            <div class="b-name">${esc(b.name)}</div>
            <div class="b-meta">${esc(b.competicao??'')} · ${cnt}/${b.max_participants??'?'} pessoas · ${b.deadline?fmtDate(b.deadline):'sem prazo'}</div>
          </div>
          <div class="b-prize">${fmtMoney(prz)}</div>
          <span class="st ${stClass(b.status)}">${stLabel(b.status)}</span>
        </div>
      </div>
    </a>`}).join('')
  document.getElementById('content').innerHTML=`<div style="margin-bottom:6px"><p style="font-size:13px;color:var(--muted)">${data.length} bolão(ões) encontrado(s)</p></div>${cards}`
})
</script>
<script>
async function carregarNotifBadge() {
  const user = await getUser()
  if (!user) return
  const { count } = await sb().from('notifications')
    .select('*', { count: 'exact', head: true })
    .eq('user_id', user.id)
    .eq('is_read', false)
  const badge = document.getElementById('notifBadge')
  if (badge && count > 0) {
    badge.textContent = count > 9 ? '9+' : count
    badge.style.display = 'flex'
  }
}
function abrirNotifs() { location.href = 'configuracoes.html#notificacoes' }
carregarNotifBadge()
</script>
