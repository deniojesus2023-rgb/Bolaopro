<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BolãoPro — Bolão</title>
<link rel="stylesheet" href="shared.css"/>
<style>
.detail-hero{background:var(--white);border:1px solid var(--border);border-top:3px solid var(--green);border-radius:var(--r-lg);padding:22px;margin-bottom:20px;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;}
.hero-info h1{font-size:20px;font-weight:700;letter-spacing:-.3px;margin-bottom:4px;}
.hero-info p{font-size:12px;color:var(--muted);}
.prize-box{background:var(--gold-lt);border:1px solid #FCD34D;border-radius:var(--r);padding:12px 18px;text-align:center;flex-shrink:0;}
.prize-box-val{font-size:26px;font-weight:800;color:var(--gold);letter-spacing:-1px;line-height:1;}
.prize-box-lbl{font-size:10px;color:#92400E;margin-top:3px;}
.detail-grid{display:grid;grid-template-columns:1fr 320px;gap:18px;}
.match-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;margin-bottom:14px;box-shadow:var(--shadow);}
.match-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.comp-tag{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted);background:var(--bg);padding:3px 8px;border-radius:6px;text-transform:uppercase;}
.match-time{font-size:11px;color:var(--muted);}
.teams-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;margin-bottom:16px;}
.team{text-align:center;}
.team-logo{width:52px;height:52px;border-radius:50%;background:var(--bg);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 8px;}
.team-name{font-size:13px;font-weight:700;}
.score-vs{text-align:center;}
.score-vs .score{font-size:30px;font-weight:800;letter-spacing:2px;color:var(--text);}
.score-vs .vs{font-size:14px;font-weight:700;color:var(--light);letter-spacing:2px;}
.pred-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.pred-btn{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);padding:11px 8px;text-align:center;cursor:pointer;transition:all .15s;}
.pred-btn:hover{border-color:var(--green);}
.pred-btn.sel{background:var(--green-lt);border-color:var(--green-m);}
.pred-lbl{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:3px;}
.pred-odd{font-size:19px;font-weight:800;color:var(--text);letter-spacing:-.5px;}
.pred-btn.sel .pred-odd{color:var(--green);}
.pred-partner{font-size:10px;color:var(--sb);margin-top:2px;}
.bar-wrap{margin-bottom:14px;}
.bar-labels{display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px;}
.bar-track{height:5px;background:var(--bg);border-radius:3px;overflow:hidden;display:flex;}
.bar-h{background:var(--green);height:100%;transition:width .5s;}
.bar-d{background:var(--gold);height:100%;transition:width .5s;}
.bar-a{background:var(--red);height:100%;transition:width .5s;}
.aff-row{display:flex;gap:8px;margin-bottom:14px;}
.aff-row a{flex:1;height:40px;border-radius:var(--r-sm);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;}
.aff-sb{background:var(--sb-lt);color:var(--sb);border:1px solid rgba(234,88,12,.2);}
.aff-sb:hover{background:rgba(234,88,12,.15);}
.aff-sup{background:var(--sup-lt);color:var(--sup);border:1px solid rgba(124,58,237,.2);}
.aff-sup:hover{background:rgba(124,58,237,.15);}
.extra-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.confirmed-box{background:var(--green-lt);border:1px solid var(--green-m);border-radius:var(--r-sm);padding:13px;text-align:center;color:var(--green);font-weight:600;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px;}
.cta-after{background:var(--sb-lt);border:1px solid rgba(234,88,12,.2);border-radius:var(--r-sm);padding:12px;text-align:center;margin-top:10px;}
.cta-after p{font-size:12px;color:var(--sb);font-weight:600;margin-bottom:8px;}
.cta-after .pills{display:flex;gap:8px;justify-content:center;}
.cta-pill{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:700;text-decoration:none;transition:all .15s;}
.pill-sb{background:rgba(234,88,12,.15);color:var(--sb);}
.pill-sup{background:rgba(124,58,237,.15);color:var(--sup);}
.sidebar-panel{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;box-shadow:var(--shadow);position:sticky;top:80px;}
.panel-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.sb-rank{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.sb-rank:last-child{border-bottom:none;}
.sb-pos{font-size:14px;width:22px;text-align:center;color:var(--light);font-weight:700;}
.sb-av{width:30px;height:30px;border-radius:50%;background:var(--green-lt);border:2px solid var(--green-m);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--green);flex-shrink:0;}
.sb-name{flex:1;font-size:12px;font-weight:600;}
.sb-pts{font-size:14px;font-weight:700;color:var(--gold);}
.invite-box{background:var(--bg);border-radius:var(--r-sm);padding:14px;margin-top:14px;}
.invite-title{font-size:12px;font-weight:600;margin-bottom:10px;}
.invite-link-val{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:11px;color:var(--green);font-family:monospace;word-break:break-all;margin-bottom:8px;}
.invite-btns{display:flex;gap:6px;}
.inv-btn{flex:1;height:32px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;}
.inv-wpp{background:#DCFCE7;color:var(--wpp);border:1px solid #BBF7D0;}
.inv-copy{background:var(--white);border:1px solid var(--border);color:var(--muted);}
.inv-copy:hover{border-color:var(--green);color:var(--green);}
.pix-box{background:var(--green-lt);border:1px solid var(--green-m);border-radius:var(--r-sm);padding:14px;text-align:center;margin-top:14px;}
.pix-box p:first-child{font-size:11px;color:var(--muted);margin-bottom:6px;}
.pix-box .pix-val{font-size:22px;font-weight:800;color:var(--green);letter-spacing:-1px;}
.pix-box .pix-sub{font-size:11px;color:var(--muted);margin:5px 0 12px;}
@media(max-width:900px){.detail-grid{grid-template-columns:1fr;}.sidebar-panel{position:static;}}
</style>
</head>

<script>
const pid = new URLSearchParams(location.search).get('id')
let bolaoData=null, currentUser=null, prediction=null, confirmed=false, saving=false

document.addEventListener('DOMContentLoaded', async () => {
  if (!pid) { location.href='index.html'; return }
  currentUser = await initAuth()
  if (currentUser) {
    hideEl('sideLogin'); showEl('sideLogout')
    const p = await getProfile(currentUser.id)
    const n = p?.username ?? currentUser.email?.split('@')[0] ?? '?'
    setEl('topUserName',n); setEl('topUserAv',n.slice(0,2).toUpperCase())
  }
  bolaoData = await getBolao(pid)
  if (!bolaoData) { document.getElementById('pageContent').innerHTML='<div class="empty"><div class="empty-icon">❌</div><p>Bolão não encontrado</p><a href="index.html" class="btn-full" style="max-width:200px;margin-top:12px">Voltar</a></div>'; return }
  renderPage()
  subscribeRealtime()
})

function renderPage() {
  const b      = bolaoData
  const parts  = b.participants ?? []
  const count  = parts.filter(p=>p.payment_status==='paid').length
  const prize  = (b.cota_value??0) * count * 0.95
  const match  = b.bolao_matches?.[0]?.match
  const home   = match?.home_team ?? b.time_casa ?? 'Time A'
  const away   = match?.away_team ?? b.time_fora ?? 'Time B'
  const homeLg = match?.home_team_logo ? `<img src="${match.home_team_logo}" style="width:32px;height:32px;object-fit:contain">` : '⚽'
  const awayLg = match?.away_team_logo ? `<img src="${match.away_team_logo}" style="width:32px;height:32px;object-fit:contain">` : '⚽'
  const comp   = match?.round_name ?? b.competicao ?? ''
  const dt     = match?.match_date ? fmtDate(match.match_date) : '—'
  const link   = `${location.origin}${location.pathname}?id=${b.id}`
  const waMsg  = encodeURIComponent(`🏆 Entra no bolão "${b.name}"!\n💰 Cota: R$ ${b.cota_value}\n${link}`)
  const ranked = [...parts].filter(p=>p.payment_status==='paid').sort((a,z)=>(z.total_points??0)-(a.total_points??0))
  const M = {1:'🥇',2:'🥈',3:'🥉'}

  const isLive = match?.status==='live'
  const isDone = match?.status==='finished' || b.status==='finished'
  const vsHtml = (isLive||isDone) && match?.home_score!==null
    ? `<div class="score">${match.home_score} <span style="color:var(--light)">×</span> ${match.away_score}</div>`
    : `<div class="vs">VS</div>`

  // Palpite existente
  const myPred = parts.find(p=>p.user_id===currentUser?.id)
  if (myPred && myPred.prediction) { prediction=myPred.prediction; confirmed=true }

  const isParticipant = !!parts.find(p=>p.user_id===currentUser?.id && p.payment_status==='paid')

  document.getElementById('pageContent').innerHTML = `
  <div class="detail-hero">
    <div class="hero-info">
      <h1>${esc(b.name)}</h1>
      <p>
        <span class="st ${stClass(b.status)}" style="margin-right:6px">${stLabel(b.status)}</span>
        @${b.owner?.username??'anônimo'} · ${count}/${b.max_participants} participantes · Cota R$ ${b.cota_value}
      </p>
    </div>
    <div class="prize-box">
      <div class="prize-box-val">${fmtMoney(prize)}</div>
      <div class="prize-box-lbl">🏆 Prêmio · ${b.prize_split}</div>
    </div>
  </div>

  <div class="detail-grid">
    <div>
      <div class="match-card">
        <div class="match-head">
          <span class="comp-tag">${esc(comp)}</span>
          <span class="match-time">${dt}</span>
        </div>
        <div class="teams-row">
          <div class="team"><div class="team-logo">${homeLg}</div><div class="team-name">${esc(home)}</div></div>
          <div class="score-vs">${vsHtml}</div>
          <div class="team"><div class="team-logo">${awayLg}</div><div class="team-name">${esc(away)}</div></div>
        </div>
        <div class="pred-btns" id="predBtns">
          ${(()=>{
            const oddH = match?.odd_home_sportingbet ?? match?.odd_home ?? '—'
            const oddD = match?.odd_draw_sportingbet ?? match?.odd_draw ?? '—'
            const oddA = match?.odd_away_sportingbet ?? match?.odd_away ?? '—'
            return [{k:'home',l:home,o:oddH,p:'Sportingbet'},{k:'draw',l:'Empate',o:oddD,p:'Superbet'},{k:'away',l:away,o:oddA,p:'Sportingbet'}]
              .map(x=>`<div class="pred-btn${prediction===x.k?' sel':''}" onclick="${isDone||confirmed?'':` pickPred('${x.k}')`}">
              <div class="pred-lbl">${esc(x.l)}</div>
              <div class="pred-odd">${x.o}</div>
              <div class="pred-partner">${x.p}</div>
            </div>`).join('')
          })()}
        </div>
        <div class="bar-wrap">
          <div class="bar-labels">
            <span style="color:var(--green)">${Math.round((parts.filter(p=>p.predicted_result==='home').length/(count||1))*100)||55}% ${esc(home)}</span>
            <span style="color:var(--gold)">${Math.round((parts.filter(p=>p.predicted_result==='draw').length/(count||1))*100)||22}% Empate</span>
            <span style="color:var(--red)">${Math.round((parts.filter(p=>p.predicted_result==='away').length/(count||1))*100)||23}% ${esc(away)}</span>
          </div>
          <div class="bar-track">
            <div class="bar-h" style="width:55%"></div><div class="bar-d" style="width:22%"></div><div class="bar-a" style="width:23%"></div>
          </div>
        </div>
        <div class="aff-row">
          <a href="${CONFIG.SPORTINGBET}" target="_blank" class="aff-sb">⚡ Sportingbet</a>
          <a href="${CONFIG.SUPERBET}"    target="_blank" class="aff-sup">⚡ Superbet</a>
        </div>
        <div class="extra-row">
          <div class="fl" style="margin:0"><label>Placar exato (bônus +8pts)</label>
            <div style="display:flex;align-items:center;gap:8px">
              <input id="scoreH" type="number" min="0" max="20" placeholder="0" style="text-align:center;padding:10px 8px" inputmode="numeric" ${confirmed?'disabled':''}/>
              <span style="color:var(--muted);font-weight:700">×</span>
              <input id="scoreA" type="number" min="0" max="20" placeholder="0" style="text-align:center;padding:10px 8px" inputmode="numeric" ${confirmed?'disabled':''}/>
            </div>
          </div>
          <div class="fl" style="margin:0"><label>Artilheiro (bônus +5pts)</label>
            <input id="scorer" placeholder="Nome do jogador" ${confirmed?'disabled':''}/>
          </div>
        </div>
        <div id="predResult">
          ${confirmed ? `
          <div class="confirmed-box">✅ Palpite confirmado!</div>
          <div class="cta-after">
            <p>🔥 Aposte de verdade no seu palpite!</p>
            <div class="pills">
              <a href="${CONFIG.SPORTINGBET}" target="_blank" class="cta-pill pill-sb">Sportingbet — 1.90</a>
              <a href="${CONFIG.SUPERBET}"    target="_blank" class="cta-pill pill-sup">Superbet — 1.95</a>
            </div>
          </div>` : `
          <div id="predErr" class="err-box" style="margin-bottom:10px"></div>
          <button class="btn-full" id="predBtn" onclick="confirmarPalpite()" style="height:46px">⚽ Confirmar Palpite</button>`}
        </div>
      </div>
    </div>

    <div>
      <div class="sidebar-panel">
        <div class="panel-title">🏆 Ranking <span class="live-dot" style="margin-left:4px"></span></div>
        ${ranked.length
          ? ranked.slice(0,8).map((p,i)=>{
              const pos=i+1, name=p.profile?.username??'Jogador', isMe=p.user_id===currentUser?.id
              return `<div class="sb-rank">
                <div class="sb-pos">${M[pos]??pos}</div>
                <div class="sb-av">${name.slice(0,2).toUpperCase()}</div>
                <div class="sb-name" style="${isMe?'color:var(--green)':''}">${esc(name)}${isMe?' <span style="font-size:9px;background:var(--green-lt);color:var(--green);padding:1px 5px;border-radius:3px">você</span>':''}</div>
                <div class="sb-pts">${p.total_points??0}</div>
              </div>`}).join('')
          : '<p style="font-size:12px;color:var(--light);text-align:center;padding:12px">Sem palpites ainda</p>'}

        <div class="invite-box">
          <div class="invite-title">📲 Convidar amigos</div>
          <div class="invite-link-val">${link}</div>
          <div class="invite-btns">
            <a href="https://wa.me/?text=${waMsg}" target="_blank" class="inv-btn inv-wpp">WhatsApp</a>
            <button onclick="navigator.clipboard.writeText('${link}');showToast('📋 Copiado!')" class="inv-btn inv-copy">Copiar</button>
          </div>
        </div>

        ${!isParticipant && b.status==='open' ? `
        <div class="pix-box">
          <p>Cota de entrada</p>
          <div class="pix-val">${fmtMoney(b.cota_value)}</div>
          <div class="pix-sub">Pague via Pix para participar</div>
          <button onclick="entrarBolao()" class="btn-full" style="height:38px;font-size:13px">💳 Pagar e Entrar</button>
        </div>` : ''}

        ${currentUser && b.owner_id === currentUser.id ? `
        <div class="invite-box" style="margin-top:14px">
          <div class="invite-title">⚙️ Adicionar Jogo ao Bolão</div>
          <select id="matchSelect" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;margin-bottom:8px;background:var(--white)">
            <option value="">Carregando jogos…</option>
          </select>
          <button onclick="vincularJogo()" class="btn-full" id="vincularBtn" style="height:36px;font-size:12px">🔗 Vincular Jogo</button>
          <div id="vincularErr" style="font-size:11px;color:var(--red);margin-top:6px"></div>
        </div>` : ''}
      </div>
    </div>
  </div>`

  if (currentUser && b.owner_id === currentUser.id) carregarMatchesDisponiveis()
}

function pickPred(k) {
  prediction = k
  document.querySelectorAll('.pred-btn').forEach((b,i)=>{
    b.classList.toggle('sel', ['home','draw','away'][i]===k)
  })
}

async function confirmarPalpite() {
  if (confirmed || saving) return
  // Validar se bolão ainda aceita palpites
  if (bolaoData.status === 'finished' || bolaoData.status === 'cancelled') {
    showToast('Este bolão já foi encerrado')
    return
  }
  if (bolaoData.deadline && new Date(bolaoData.deadline) < new Date()) {
    showToast('O prazo para palpites encerrou')
    return
  }
  if (!bolaoData.bolao_matches || bolaoData.bolao_matches.length === 0) {
    const errEl = document.getElementById('predErr')
    if (errEl) errEl.textContent = 'Este bolão não possui jogos vinculados. O administrador deve adicionar jogos.'
    const btn = document.getElementById('predBtn')
    if (btn) btn.disabled = true
    return
  }
  if (!prediction) { showToast('Selecione um resultado primeiro'); return }
  if (!currentUser) { location.href='login.html'; return }
  saving=true
  const btn=document.getElementById('predBtn')
  if(btn){btn.textContent='Salvando…';btn.disabled=true}
  const matchId = bolaoData.bolao_matches[0].match?.id
  const h=document.getElementById('scoreH')?.value
  const a=document.getElementById('scoreA')?.value
  const s=document.getElementById('scorer')?.value
  const ok = await salvarPalpite(pid, matchId, currentUser.id, prediction, h, a, s)
  saving=false
  if (ok) { confirmed=true; showToast('🎯 Palpite confirmado!'); renderPage() }
  else { if(btn){btn.textContent='⚽ Confirmar Palpite';btn.disabled=false}; showToast('Erro ao salvar palpite') }
}

function entrarBolao() { showToast('💳 Integração Pix em breve! Combine o pagamento com o criador.') }

async function carregarMatchesDisponiveis() {
  const sel = document.getElementById('matchSelect')
  if (!sel) return
  const { data, error } = await sb().from('matches')
    .select('id, home_team, away_team, match_date, status')
    .eq('status', 'scheduled')
    .order('match_date')
  if (error || !data || data.length === 0) {
    sel.innerHTML = '<option value="">Nenhum jogo disponível</option>'
    return
  }
  sel.innerHTML = '<option value="">Selecione um jogo…</option>' +
    data.map(m => {
      const dt = m.match_date ? new Date(m.match_date).toLocaleDateString('pt-BR') : ''
      return `<option value="${m.id}">${esc(m.home_team)} × ${esc(m.away_team)}${dt ? ' — ' + dt : ''}</option>`
    }).join('')
}

async function vincularJogo() {
  const sel = document.getElementById('matchSelect')
  const btn = document.getElementById('vincularBtn')
  const errEl = document.getElementById('vincularErr')
  const matchId = sel?.value
  if (!matchId) { if (errEl) errEl.textContent = 'Selecione um jogo.'; return }
  if (errEl) errEl.textContent = ''
  if (btn) { btn.textContent = 'Vinculando…'; btn.disabled = true }
  const { error } = await sb().from('bolao_matches').insert({ bolao_id: pid, match_id: matchId })
  if (btn) { btn.textContent = '🔗 Vincular Jogo'; btn.disabled = false }
  if (error) {
    if (errEl) errEl.textContent = 'Erro ao vincular: ' + (error.message ?? 'tente novamente')
    return
  }
  showToast('✅ Jogo vinculado com sucesso!')
  bolaoData = await getBolao(pid)
  if (bolaoData) renderPage()
}

function subscribeRealtime() {
  sb().channel(`bolao_${pid}`)
    .on('postgres_changes',{event:'*',schema:'public',table:'participants',filter:`bolao_id=eq.${pid}`},async()=>{ bolaoData=await getBolao(pid); if(bolaoData) renderPage() })
    .subscribe()
}
</script>
<script>
async function carregarNotifBadge() {
  const user = await getUser()
  if (!user) return
  const { count } = await sb().from('notifications')
    .select('*', { count: 'exact', head: true })
    .eq('user_id', user.id)
    .eq('is_read', false)
  const badge = document.getElementById('notifBadge')
  if (badge && count > 0) {
    badge.textContent = count > 9 ? '9+' : count
    badge.style.display = 'flex'
  }
}
function abrirNotifs() { location.href = 'configuracoes.html#notificacoes' }
carregarNotifBadge()
</script>
