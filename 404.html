<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>BolãoPro — Página não encontrada</title>
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="stylesheet" href="design-system.css"/>
<link rel="stylesheet" href="shared.css"/>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
body{display:block;background:var(--bg);}
.err-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.err-box{background:var(--white);border:1px solid var(--border);border-radius:var(--r-xl);padding:48px 32px;width:100%;max-width:420px;box-shadow:var(--shadow-md);text-align:center;}
.err-code{font-size:80px;font-weight:800;letter-spacing:-4px;color:var(--green);line-height:1;margin-bottom:8px;}
.err-title{font-size:22px;font-weight:700;margin-bottom:8px;letter-spacing:-.3px;}
.err-sub{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:28px;}
.err-links{display:flex;flex-direction:column;gap:8px;}
</style>
</head>
<body>
<div class="err-wrap">
  <div class="err-box">
    <div class="err-code">404</div>
    <div style="font-size:40px;margin-bottom:12px">⚽</div>
    <div class="err-title">Página não encontrada</div>
    <div class="err-sub">O link que você acessou não existe ou foi removido.<br>Que tal voltar para o dashboard?</div>
    <div class="err-links">
      <a href="index.html" class="btn-full"><i data-lucide="home"></i> Voltar ao Início</a>
      <a href="meus-boloes.html" class="btn-full" style="background:var(--bg);color:var(--text);border:1px solid var(--border)"><i data-lucide="users"></i> Meus Bolões</a>
    </div>
  </div>
</div>
<script>document.addEventListener('DOMContentLoaded',()=>{if(window.lucide)lucide.createIcons()})</script>
</body>
</html>
